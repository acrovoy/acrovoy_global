<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40" width="60" height="40">
  <!-- Синий фон -->
  <rect width="60" height="40" fill="#012169"></rect>
  
  <!-- Белые диагонали -->
  <polygon points="0,0 60,40 55,40 0,5" fill="#fff"></polygon>
  <polygon points="60,0 0,40 5,40 60,5" fill="#fff"></polygon>
  
  <!-- Красные диагонали -->
  <polygon points="0,0 60,40 58,40 0,2" fill="#C8102E"></polygon>
  <polygon points="60,0 0,40 2,40 60,2" fill="#C8102E"></polygon>
  
  <!-- Белый крест -->
  <rect x="25" width="10" height="40" fill="#fff"></rect>
  <rect y="15" width="60" height="10" fill="#fff"></rect>
  
  <!-- Красный крест -->
  <rect x="27" width="6" height="40" fill="#C8102E"></rect>
  <rect y="17" width="60" height="6" fill="#C8102E"></rect>
</svg>